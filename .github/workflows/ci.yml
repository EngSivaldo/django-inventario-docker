name: Django CI/CD Pipeline

# O gatilho: roda toda vez que você faz um 'push' para a branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Aqui simulamos o seu Docker Desktop no GitHub
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: inventario_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        # Garante que o Postgres esteja pronto antes de iniciar o Django
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar Configurações e Rodar Testes
        env:
          # Passamos as variáveis do .env para o ambiente do GitHub
          DEBUG: True
          SECRET_KEY: "chave-secreta-para-testes"
          DB_NAME: inventario_db
          DB_USER: admin
          DB_PASSWORD: password123
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          python manage.py check
          python manage.py test